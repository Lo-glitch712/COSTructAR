<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>COSTruct AR - Measurement</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { overflow: hidden; font-family: Arial, sans-serif; }

      #status-bar {
        position: fixed;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.75);
        color: white;
        padding: 10px 20px;
        border-radius: 20px;
        font-size: 14px;
        text-align: center;
        z-index: 1000;
        width: 90%;
        max-width: 400px;
      }

      #measurement-box {
        position: fixed;
        bottom: 120px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.75);
        color: white;
        padding: 12px 20px;
        border-radius: 15px;
        font-size: 16px;
        text-align: center;
        z-index: 1000;
        width: 90%;
        max-width: 400px;
        display: none;
      }

      #measurement-box .distance {
        font-size: 28px;
        font-weight: bold;
        color: #4CAF50;
      }

      #measurement-box .area {
        font-size: 20px;
        color: #2196F3;
        margin-top: 5px;
      }

      #button-container {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        z-index: 1000;
        width: 90%;
        max-width: 400px;
        justify-content: center;
      }

      .btn {
        padding: 12px 20px;
        border: none;
        border-radius: 25px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        flex: 1;
      }

      #btn-place { background: #4CAF50; color: white; }
      #btn-undo { background: #FF9800; color: white; }
      #btn-clear { background: #f44336; color: white; }
      #btn-area { background: #2196F3; color: white; display: none; }

      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 40px;
        height: 40px;
        z-index: 1000;
        pointer-events: none;
      }

      #crosshair::before,
      #crosshair::after {
        content: '';
        position: absolute;
        background: white;
      }

      #crosshair::before {
        width: 2px;
        height: 100%;
        left: 50%;
        transform: translateX(-50%);
      }

      #crosshair::after {
        width: 100%;
        height: 2px;
        top: 50%;
        transform: translateY(-50%);
      }

      .crosshair-dot {
        position: absolute;
        width: 6px;
        height: 6px;
        background: #4CAF50;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      #marker-status {
        position: fixed;
        top: 65px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(244, 67, 54, 0.85);
        color: white;
        padding: 8px 16px;
        border-radius: 15px;
        font-size: 13px;
        z-index: 1000;
        text-align: center;
        width: 90%;
        max-width: 400px;
      }

      #marker-status.detected {
        background: rgba(76, 175, 80, 0.85);
      }
    </style>
  </head>

  <body>

    <!-- Crosshair -->
    <div id="crosshair">
      <div class="crosshair-dot"></div>
    </div>

    <!-- Status Bar -->
    <div id="status-bar">
      Show the HIRO marker to the camera first
    </div>

    <!-- Marker Status -->
    <div id="marker-status">
      🔴 Marker not detected
    </div>

    <!-- Measurement Display -->
    <div id="measurement-box">
      <div class="distance" id="distance-display">--</div>
      <div class="area" id="area-display"></div>
    </div>

    <!-- Buttons -->
    <div id="button-container">
      <button class="btn" id="btn-place" onclick="placePoint()" disabled>
        📍 Place Point
      </button>
      <button class="btn" id="btn-undo" onclick="undoPoint()">↩ Undo</button>
      <button class="btn" id="btn-area" onclick="computeArea()">📐 Area</button>
      <button class="btn" id="btn-clear" onclick="clearAll()">🗑 Clear</button>
    </div>

    <!-- AR Scene -->
    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; antialias: true;"
      id="ar-scene"
    >

      <!-- Hiro Marker as scale reference -->
      <!-- Hiro marker real size = 8cm x 8cm -->
      <a-marker
        preset="hiro"
        id="hiro-marker"
        size="0.08"
      >
        <!-- Visual indicator na na-detect ang marker -->
        <a-ring
          position="0 0 0"
          rotation="-90 0 0"
          radius-inner="0.4"
          radius-outer="0.5"
          color="#4CAF50"
          opacity="0.8"
        ></a-ring>
        <a-text
          value="SCALE REF"
          position="0 0.1 0"
          align="center"
          color="white"
          scale="0.5 0.5 0.5"
          rotation="-90 0 0"
        ></a-text>
      </a-marker>

      <!-- Container para sa measurement points -->
      <a-entity id="points-container"></a-entity>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const marker = document.getElementById('hiro-marker');
      const markerStatus = document.getElementById('marker-status');
      const statusBar = document.getElementById('status-bar');
      const measurementBox = document.getElementById('measurement-box');
      const distanceDisplay = document.getElementById('distance-display');
      const areaDisplay = document.getElementById('area-display');
      const btnPlace = document.getElementById('btn-place');
      const btnArea = document.getElementById('btn-area');
      const pointsContainer = document.getElementById('points-container');
      const scene = document.getElementById('ar-scene');

      let markerDetected = false;
      let points3D = [];
      let pointEntities = [];
      let lineEntities = [];

      // =====================
      // MARKER DETECTION
      // =====================
      marker.addEventListener('markerFound', () => {
        markerDetected = true;
        markerStatus.textContent = '🟢 Marker detected — Ready to measure!';
        markerStatus.classList.add('detected');
        btnPlace.disabled = false;
        statusBar.textContent = 'Aim crosshair at a point → tap Place Point';
      });

      marker.addEventListener('markerLost', () => {
        markerDetected = false;
        markerStatus.textContent = '🔴 Marker lost — Show marker again';
        markerStatus.classList.remove('detected');
        statusBar.textContent = 'Show HIRO marker to continue measuring';
      });

      // =====================
      // PLACE POINT
      // =====================
      function placePoint() {
        if (!markerDetected) {
          statusBar.textContent = '⚠️ Show the HIRO marker first!';
          return;
        }

        // Kukunin ang world position ng marker
        const markerObj = marker.object3D;
        const markerPos = new THREE.Vector3();
        markerObj.getWorldPosition(markerPos);

        // Kukunin ang camera
        const camera = document.querySelector('[camera]');
        const cameraObj = camera.object3D;
        const cameraPos = new THREE.Vector3();
        cameraObj.getWorldPosition(cameraPos);

        // Ray from camera center (crosshair) into scene
        const cameraDir = new THREE.Vector3();
        cameraObj.getWorldDirection(cameraDir);

        // Project onto estimated ground plane (y = marker y)
        const targetY = markerPos.y;
        const t = (targetY - cameraPos.y) / cameraDir.y;

        let pointPos;

        if (t > 0 && isFinite(t)) {
          // Floor measurement
          pointPos = new THREE.Vector3(
            cameraPos.x + cameraDir.x * t,
            targetY,
            cameraPos.z + cameraDir.z * t
          );
        } else {
          // Wall measurement — project forward
          const distance = 1.5; // assume 1.5 units forward
          pointPos = new THREE.Vector3(
            cameraPos.x + cameraDir.x * distance,
            cameraPos.y + cameraDir.y * distance,
            cameraPos.z + cameraDir.z * distance
          );
        }

        points3D.push(pointPos.clone());

        // Add visual dot sa scene
        const sphere = document.createElement('a-sphere');
        sphere.setAttribute('position', `${pointPos.x} ${pointPos.y} ${pointPos.z}`);
        sphere.setAttribute('radius', '0.03');
        sphere.setAttribute('color', '#4CAF50');
        scene.appendChild(sphere);
        pointEntities.push(sphere);

        // Add label
        const label = document.createElement('a-text');
        const pointLabel = String.fromCharCode(64 + points3D.length);
        label.setAttribute('value', pointLabel);
        label.setAttribute('position', `${pointPos.x} ${pointPos.y + 0.08} ${pointPos.z}`);
        label.setAttribute('align', 'center');
        label.setAttribute('color', 'white');
        label.setAttribute('scale', '0.3 0.3 0.3');
        label.setAttribute('look-at', '[camera]');
        scene.appendChild(label);
        pointEntities.push(label);

        // Draw line between points
        if (points3D.length >= 2) {
          const prev = points3D[points3D.length - 2];
          const curr = points3D[points3D.length - 1];
          drawLine(prev, curr);
          computeDistances();
          measurementBox.style.display = 'block';
        }

        if (points3D.length >= 3) {
          btnArea.style.display = 'block';
        }

        statusBar.textContent = `Point ${String.fromCharCode(64 + points3D.length)} placed. Total: ${points3D.length}`;
      }

      // =====================
      // DRAW LINE
      // =====================
      function drawLine(p1, p2) {
        const midX = (p1.x + p2.x) / 2;
        const midY = (p1.y + p2.y) / 2;
        const midZ = (p1.z + p2.z) / 2;

        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        const dz = p2.z - p1.z;
        const length = Math.sqrt(dx*dx + dy*dy + dz*dz);

        const line = document.createElement('a-cylinder');
        line.setAttribute('position', `${midX} ${midY} ${midZ}`);
        line.setAttribute('height', length);
        line.setAttribute('radius', '0.008');
        line.setAttribute('color', '#FFD700');
        line.setAttribute('look-at', `${p2.x} ${p2.y} ${p2.z}`);
        scene.appendChild(line);
        lineEntities.push(line);
      }

      // =====================
      // COMPUTE DISTANCES
      // =====================
      function computeDistances() {
        if (points3D.length < 2) return;

        // AR.js scale: 1 unit = 10cm (based on hiro marker size)
        const scale = 10;

        let totalCm = 0;

        for (let i = 0; i < points3D.length - 1; i++) {
          const p1 = points3D[i];
          const p2 = points3D[i + 1];
          const dist = p1.distanceTo(p2) * scale;
          totalCm += dist;
        }

        const totalM = (totalCm / 100).toFixed(2);

        if (points3D.length === 2) {
          const p1 = points3D[0];
          const p2 = points3D[1];
          const dist = p1.distanceTo(p2) * scale;
          distanceDisplay.innerHTML = `
            ${dist.toFixed(1)} cm
            <br><small style="font-size:16px">${(dist/100).toFixed(2)} m</small>
          `;
        } else {
          distanceDisplay.innerHTML = `
            Total: ${totalCm.toFixed(1)} cm
            <br><small style="font-size:16px">${totalM} m</small>
          `;
        }

        areaDisplay.textContent = '';
      }

      // =====================
      // COMPUTE AREA
      // =====================
      function computeArea() {
        if (points3D.length < 3) return;

        const scale = 10;

        // Shoelace formula sa 3D (project to XZ plane)
        let area = 0;
        const n = points3D.length;

        for (let i = 0; i < n; i++) {
          const j = (i + 1) % n;
          area += points3D[i].x * points3D[j].z;
          area -= points3D[j].x * points3D[i].z;
        }

        area = Math.abs(area) / 2;

        // Convert to cm squared
        const areaCm2 = area * scale * scale;
        const areaM2 = (areaCm2 / 10000).toFixed(2);

        areaDisplay.textContent = `Area: ${areaCm2.toFixed(1)} cm² | ${areaM2} m²`;
        statusBar.textContent = `Area: ${areaM2} m²`;
      }

      // =====================
      // UNDO
      // =====================
      function undoPoint() {
        if (points3D.length === 0) return;

        points3D.pop();

        // Remove last 2 entities (sphere + label)
        for (let i = 0; i < 2; i++) {
          const entity = pointEntities.pop();
          if (entity) entity.remove();
        }

        // Remove last line
        const line = lineEntities.pop();
        if (line) line.remove();

        if (points3D.length < 2) {
          measurementBox.style.display = 'none';
        } else {
          computeDistances();
        }

        if (points3D.length < 3) {
          btnArea.style.display = 'none';
          areaDisplay.textContent = '';
        }

        statusBar.textContent = `Undo. ${points3D.length} point(s) remaining.`;
      }

      // =====================
      // CLEAR ALL
      // =====================
      function clearAll() {
        points3D = [];

        pointEntities.forEach(e => e.remove());
        pointEntities = [];

        lineEntities.forEach(e => e.remove());
        lineEntities = [];

        measurementBox.style.display = 'none';
        btnArea.style.display = 'none';
        areaDisplay.textContent = '';
        distanceDisplay.textContent = '--';
        statusBar.textContent = 'Cleared. Place new points.';
      }
    </script>

  </body>
</html>
